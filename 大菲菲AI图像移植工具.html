<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#7c3aed">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="AI移植工具">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icon.svg">
    <title>大菲菲专属AI图像移植工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <style>
        .checkerboard {
            background-color: #fff;
            background-image: linear-gradient(45deg, #f1f5f9 25%, transparent 25%),
                linear-gradient(-45deg, #f1f5f9 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #f1f5f9 75%),
                linear-gradient(-45deg, transparent 75%, #f1f5f9 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 999px;
            background: currentColor;
            border: 2px solid #fff;
        }

        .seal-item.active .seal-outline {
            opacity: 1;
        }

        .seal-item {
            --touch-padding: 18px;
            padding: var(--touch-padding);
            margin: calc(var(--touch-padding) * -1);
            box-sizing: content-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @media (pointer: coarse) {
            .seal-item {
                --touch-padding: 28px;
            }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-rose-50 via-white to-sky-50 text-slate-800">
    <main class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 space-y-6">
        <header class="rounded-3xl bg-white/90 border border-white shadow-lg p-6">
            <h1 class="text-2xl sm:text-3xl font-black bg-gradient-to-r from-rose-600 to-sky-600 bg-clip-text text-transparent">大菲菲专属AI图像移植工具</h1>
            <p class="text-sm text-slate-500 mt-2">本地处理 | 阈值抠印章 | 多印章叠加 | PDF 导出</p>
        </header>

        <section class="grid lg:grid-cols-2 gap-6">
            <div class="rounded-3xl bg-white/90 border border-white shadow-lg p-5 space-y-4">
                <h2 class="text-lg font-bold">步骤 1：提取印章</h2>
                <label id="upload-source-area" class="block border-2 border-dashed border-slate-300 rounded-2xl p-8 text-center cursor-pointer hover:border-rose-400 hover:bg-rose-50/40 transition">
                    <p class="font-semibold">上传原始印章图片</p>
                    <p class="text-xs text-slate-500 mt-1">支持 JPG / PNG</p>
                    <input id="source-input" type="file" class="hidden" accept="image/*">
                </label>

                <div id="edit-source-area" class="hidden space-y-4">
                    <div class="grid sm:grid-cols-2 gap-4">
                        <div class="rounded-xl overflow-hidden border border-slate-200 bg-slate-100 flex items-center justify-center min-h-[180px]">
                            <img id="source-preview-img" class="max-w-full max-h-[260px] object-contain p-2" alt="source">
                        </div>
                        <div class="rounded-xl overflow-hidden border border-slate-200 checkerboard flex items-center justify-center min-h-[180px]">
                            <img id="processed-preview-img" class="max-w-full max-h-[260px] object-contain p-2" alt="processed">
                        </div>
                    </div>
                    <div>
                        <div class="flex items-center justify-between text-sm mb-1">
                            <span class="font-semibold">红色敏感度</span>
                            <span id="threshold-value" class="text-sky-600 font-bold">40</span>
                        </div>
                        <input id="threshold-slider" type="range" min="1" max="100" value="40" class="slider w-full h-2 rounded-lg bg-slate-200 text-rose-500 appearance-none">
                    </div>
                    <div class="flex gap-3">
                        <button onclick="resetSource()" class="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 text-sm font-semibold">重选印章</button>
                        <div id="extract-success-bar" class="hidden px-3 py-2 text-sm rounded-lg bg-emerald-50 text-emerald-700 font-semibold">印章提取成功</div>
                    </div>
                </div>
            </div>

            <div class="rounded-3xl bg-white/90 border border-white shadow-lg p-5 space-y-4">
                <h2 class="text-lg font-bold">步骤 2：移植合成</h2>
                <label id="upload-target-area" class="block border-2 border-dashed border-slate-300 rounded-2xl p-8 text-center cursor-pointer hover:border-sky-400 hover:bg-sky-50/40 transition">
                    <p class="font-semibold">上传背景图片</p>
                    <input id="target-input" type="file" class="hidden" accept="image/*">
                </label>

                <div id="edit-target-area" class="hidden space-y-4">
                    <div class="rounded-xl border border-slate-200 bg-slate-50 p-2 flex justify-center min-h-[260px]">
                        <div id="canvas-container" class="relative inline-block max-w-full max-h-[420px] overflow-hidden">
                            <img id="target-img-display" class="block max-w-full max-h-[420px] object-contain pointer-events-none" alt="target">
                            <div id="seal-stage" class="absolute inset-0"></div>
                        </div>
                    </div>

                    <div class="grid sm:grid-cols-3 gap-4">
                        <div>
                            <div class="flex items-center justify-between text-sm mb-1">
                                <span class="font-semibold">印章大小</span>
                                <span id="scale-val" class="text-sky-600 font-bold">20%</span>
                            </div>
                            <input id="scale-slider" type="range" min="1" max="120" value="20" class="slider w-full h-2 rounded-lg bg-slate-200 text-sky-500 appearance-none">
                        </div>
                        <div>
                            <div class="flex items-center justify-between text-sm mb-1">
                                <span class="font-semibold">透明度</span>
                                <span id="opacity-val" class="text-sky-600 font-bold">90%</span>
                            </div>
                            <input id="opacity-slider" type="range" min="30" max="100" value="90" class="slider w-full h-2 rounded-lg bg-slate-200 text-sky-500 appearance-none">
                        </div>
                        <div>
                            <div class="flex items-center justify-between text-sm mb-1">
                                <span class="font-semibold">旋转角度</span>
                                <span id="rotation-val" class="text-sky-600 font-bold">0 deg</span>
                            </div>
                            <input id="rotation-slider" type="range" min="-180" max="180" value="0" class="slider w-full h-2 rounded-lg bg-slate-200 text-sky-500 appearance-none">
                        </div>
                    </div>

                    <div class="rounded-xl border border-slate-200 bg-slate-50 p-4 space-y-3">
                        <div class="flex items-center justify-between">
                            <span class="font-semibold text-sm">当前选中</span>
                            <span id="active-seal-label" class="text-sm font-bold text-sky-600">暂无</span>
                        </div>
                        <div class="flex gap-2 flex-wrap">
                            <button id="duplicate-seal-btn" type="button" class="px-4 py-2 rounded-lg bg-sky-600 text-white text-sm font-bold hover:bg-sky-500 disabled:bg-slate-200 disabled:text-slate-500" disabled>复制印章</button>
                            <button id="delete-seal-btn" type="button" class="px-4 py-2 rounded-lg bg-rose-600 text-white text-sm font-bold hover:bg-rose-500 disabled:bg-slate-200 disabled:text-slate-500" disabled>删除当前印章</button>
                        </div>
                    </div>

                    <div class="rounded-xl border border-sky-100 bg-sky-50/60 p-4 space-y-2">
                        <div class="flex items-center justify-between">
                            <span class="font-semibold text-sm">余额</span>
                            <span id="balance-count" class="font-black text-sky-700">0 点</span>
                        </div>
                        <div class="flex gap-2">
                            <input id="redeem-key-input" type="text" placeholder="输入密钥（例如 DF-XXXX-XXXX-XXXX）" class="flex-1 px-3 py-2 rounded-lg border border-slate-300 text-sm outline-none focus:ring-2 focus:ring-sky-200">
                            <button id="redeem-key-btn" type="button" class="px-4 py-2 rounded-lg bg-sky-600 text-white text-sm font-bold hover:bg-sky-500">兑换</button>
                        </div>
                        <p id="redeem-key-msg" class="text-xs min-h-[18px] text-slate-500"></p>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="resetTarget()" class="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 text-sm font-semibold">重选背景</button>
                        <button id="download-btn" class="flex-1 px-4 py-2 rounded-lg bg-slate-200 text-slate-500 text-sm font-bold cursor-not-allowed" disabled>等待素材就绪...</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="preview-modal" class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm p-4">
        <div class="max-w-4xl h-full mx-auto flex items-center justify-center">
            <div class="w-full max-h-full rounded-3xl bg-white shadow-2xl p-5 space-y-4 overflow-auto">
                <h3 class="text-xl font-black">合成成功</h3>
                <div class="rounded-xl border border-slate-200 checkerboard min-h-[220px] flex items-center justify-center">
                    <img id="final-result-img" class="max-w-full max-h-[68vh] object-contain" alt="final">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="closeModal()" class="py-3 rounded-xl bg-slate-100 hover:bg-slate-200 font-semibold">关闭</button>
                    <a id="real-download-link" href="#" download="seal-result.pdf" class="py-3 rounded-xl bg-gradient-to-r from-rose-500 to-sky-500 text-white font-bold text-center">下载 PDF</a>
                </div>
            </div>
        </div>
    </div>

    <canvas id="processing-canvas" class="hidden"></canvas>
    <script>
        const STORAGE_KEYS = {
            balance: "seal_tool_balance",
            used: "seal_tool_used_keys"
        };

        const PRESET_KEYS = [
            "DF-AV6U-B8YD-3Z25","DF-P448-LFYW-LLJ8","DF-87LG-CJLK-WWDY","DF-ML76-R28V-6QSC","DF-RUP8-VEZP-BW5N",
            "DF-HDJQ-4K68-4YV4","DF-ZDJW-YLGY-KGFH","DF-QGZQ-22J9-9778","DF-7VRM-QKJQ-M4HH","DF-C38F-KNBP-VBAC",
            "DF-6ZTH-EHC4-NYGD","DF-KT5M-RQCV-NBT7","DF-SVGP-9J79-XR8E","DF-EKNZ-KC88-67F2","DF-S3ZD-6KD4-JXD3",
            "DF-NH8F-3CJQ-V548","DF-UJMX-7MQS-JJY2","DF-8HUY-L5XE-WDNV","DF-4CPU-Z6FU-RAEY","DF-GMV7-EV66-HYBR",
            "DF-W2NG-K6TP-YXFE","DF-5S8R-KUB8-SGH3","DF-E4R9-XY5R-QVTR","DF-GPL6-2HMC-9NJG","DF-YF26-5AFK-QJEY",
            "DF-33NA-K2PH-ZEME","DF-CMGK-Q4QF-4A2N","DF-JN47-FEPK-6RW9","DF-QM32-2STU-A8XE","DF-EFUT-3CCS-DWEM",
            "DF-EW4M-QNW2-357D","DF-79E7-6KAV-XETY","DF-QDRB-FDVT-DXLD","DF-EC92-9KNR-DGP3","DF-LTJT-8GN2-CSDL",
            "DF-7PDK-3Q7Y-PNGN","DF-Z7QE-YN54-RUUV","DF-67KV-5YK7-REC7","DF-2DR9-NSJE-VKJW","DF-TQTE-P563-9GWW",
            "DF-SWMB-ZY49-JCJV","DF-VR42-VC2R-WWBN","DF-VDEU-68CP-3WP3","DF-K8C4-MDZY-GKTY","DF-265Q-8ACY-KED4",
            "DF-Z46T-RX2Z-ARFQ","DF-TTTP-P3QF-BQ2K","DF-LDJ6-RQYB-MQUU","DF-UX28-8S4P-NXD4","DF-HTW7-JGGX-SL9Y",
            "DF-GE8Q-6VAN-CES4","DF-C9JZ-WEJS-LVCX","DF-BSQZ-VN3S-2XHC","DF-9QNN-UVTN-MXEX","DF-ZEHT-EFF5-LXFA",
            "DF-ZCFK-GBAR-XH9M","DF-JK3S-JJMW-HWWN","DF-22HM-DV5Q-3EYH","DF-CQ85-4CXT-CULG","DF-WRMT-5VR9-UGPT",
            "DF-AFYJ-L85S-4N2G","DF-BEWQ-TZUX-4YFR","DF-XGNG-3WL8-YD9N","DF-6T3A-CB2A-KZBC","DF-HGYB-234U-78AG",
            "DF-HSH5-SL7A-DMSR","DF-FYB7-RWBB-BCHE","DF-KKRW-QNJJ-KGNK","DF-MYZL-X68H-MERU","DF-9Z46-6GX5-WPGU",
            "DF-WVRN-BULK-MEF9","DF-SQX8-Z3F5-NMNL","DF-MCRR-WX86-SVB4","DF-HPQ2-NBLS-XLJT","DF-6SBE-EWWG-K36N",
            "DF-HQKA-76TG-WZGG","DF-6Q3G-R3TV-YCAG","DF-JQ9X-5H5U-ZASD","DF-PSW9-AWMK-HYN3","DF-E3PL-Q4NA-3GQJ",
            "DF-CHJE-CT44-U587","DF-X3LW-QE3T-FKZV","DF-AFWH-38JF-X3AF","DF-CNEN-LTN2-G9LL","DF-5A7G-3DNN-TV5E",
            "DF-VEBJ-KRPV-KT3X","DF-Z8QR-5RLM-GAN5","DF-JXPX-6CNL-DQDZ","DF-HW8V-2UUD-3UGY","DF-39AS-SUAR-Y4AW",
            "DF-TWJG-TM45-SGWH","DF-RUJW-TRPS-B5C4","DF-K8XV-LRFR-VN9F","DF-EH3B-9T6Q-99UL","DF-7DJ6-PBJL-GF5R",
            "DF-K3F9-T3RE-P9QQ","DF-DFM5-BHGP-G7JL","DF-KM3P-DM6A-VNG6","DF-MEGE-3FUK-PUY9","DF-NMWJ-FMV6-9L5A"
        ];

        const state = {
            sourceImgData: null,
            processedSealData: null,
            targetImgData: null,
            threshold: 40,
            seals: [],
            activeSealId: null,
            sealCounter: 0,
            balance: 0,
            usedKeys: {},
            lastPdfUrl: null
        };

        const els = {
            uploadSource: document.getElementById("upload-source-area"),
            editSource: document.getElementById("edit-source-area"),
            sourceInput: document.getElementById("source-input"),
            sourcePreview: document.getElementById("source-preview-img"),
            processedPreview: document.getElementById("processed-preview-img"),
            thresholdSlider: document.getElementById("threshold-slider"),
            thresholdValue: document.getElementById("threshold-value"),
            successBar: document.getElementById("extract-success-bar"),
            uploadTarget: document.getElementById("upload-target-area"),
            editTarget: document.getElementById("edit-target-area"),
            targetInput: document.getElementById("target-input"),
            targetDisplay: document.getElementById("target-img-display"),
            canvasContainer: document.getElementById("canvas-container"),
            sealStage: document.getElementById("seal-stage"),
            scaleSlider: document.getElementById("scale-slider"),
            scaleValue: document.getElementById("scale-val"),
            opacitySlider: document.getElementById("opacity-slider"),
            opacityValue: document.getElementById("opacity-val"),
            rotationSlider: document.getElementById("rotation-slider"),
            rotationValue: document.getElementById("rotation-val"),
            activeSealLabel: document.getElementById("active-seal-label"),
            duplicateSealBtn: document.getElementById("duplicate-seal-btn"),
            deleteSealBtn: document.getElementById("delete-seal-btn"),
            balanceCount: document.getElementById("balance-count"),
            redeemInput: document.getElementById("redeem-key-input"),
            redeemBtn: document.getElementById("redeem-key-btn"),
            redeemMsg: document.getElementById("redeem-key-msg"),
            downloadBtn: document.getElementById("download-btn"),
            previewModal: document.getElementById("preview-modal"),
            finalResultImg: document.getElementById("final-result-img"),
            realDownloadLink: document.getElementById("real-download-link"),
            canvas: document.getElementById("processing-canvas")
        };

        function createSeal(overrides = {}) {
            state.sealCounter += 1;
            return {
                id: `seal-${state.sealCounter}`,
                label: `印章 ${state.sealCounter}`,
                x: 50,
                y: 50,
                scale: 20,
                opacity: 0.9,
                rotation: 0,
                src: state.processedSealData,
                ...overrides
            };
        }

        function getActiveSeal() {
            return state.seals.find((seal) => seal.id === state.activeSealId) || null;
        }

        function showRedeemMessage(msg, type = "info") {
            const cls = type === "error" ? "text-rose-500" : (type === "success" ? "text-emerald-600" : "text-slate-500");
            els.redeemMsg.className = `text-xs min-h-[18px] ${cls}`;
            els.redeemMsg.innerText = msg;
        }

        function loadBalanceState() {
            const savedBalance = parseInt(localStorage.getItem(STORAGE_KEYS.balance) || "0", 10);
            state.balance = Number.isFinite(savedBalance) ? Math.max(0, savedBalance) : 0;
            try {
                state.usedKeys = JSON.parse(localStorage.getItem(STORAGE_KEYS.used) || "{}") || {};
            } catch (_) {
                state.usedKeys = {};
            }
            updateBalanceUI();
        }

        function saveBalanceState() {
            localStorage.setItem(STORAGE_KEYS.balance, String(state.balance));
            localStorage.setItem(STORAGE_KEYS.used, JSON.stringify(state.usedKeys));
        }

        function updateBalanceUI() {
            els.balanceCount.innerText = `${state.balance} 点`;
        }

        function redeemKey() {
            const key = (els.redeemInput.value || "").trim().toUpperCase();
            if (!key) {
                showRedeemMessage("请输入密钥。", "error");
                return;
            }
            if (!PRESET_KEYS.includes(key)) {
                showRedeemMessage("密钥无效。", "error");
                return;
            }
            if (state.usedKeys[key]) {
                showRedeemMessage("该密钥已被使用。", "error");
                return;
            }
            state.usedKeys[key] = true;
            state.balance += 10;
            saveBalanceState();
            updateBalanceUI();
            updateDownloadBtnState();
            els.redeemInput.value = "";
            showRedeemMessage("兑换成功，余额 +10。", "success");
        }

        function consumePoint() {
            if (state.balance <= 0) return false;
            state.balance -= 1;
            saveBalanceState();
            updateBalanceUI();
            return true;
        }

        function syncControlsFromActiveSeal() {
            const seal = getActiveSeal();
            const hasActiveSeal = Boolean(seal);
            els.scaleSlider.disabled = !hasActiveSeal;
            els.opacitySlider.disabled = !hasActiveSeal;
            els.rotationSlider.disabled = !hasActiveSeal;
            els.deleteSealBtn.disabled = !hasActiveSeal;
            els.duplicateSealBtn.disabled = !state.processedSealData;
            if (!seal) {
                els.scaleValue.innerText = "--";
                els.opacityValue.innerText = "--";
                els.rotationValue.innerText = "--";
                els.activeSealLabel.innerText = "暂无";
                return;
            }
            els.scaleSlider.value = String(seal.scale);
            els.opacitySlider.value = String(Math.round(seal.opacity * 100));
            els.rotationSlider.value = String(seal.rotation);
            els.scaleValue.innerText = `${seal.scale}%`;
            els.opacityValue.innerText = `${Math.round(seal.opacity * 100)}%`;
            els.rotationValue.innerText = `${seal.rotation} deg`;
            els.activeSealLabel.innerText = seal.label;
        }

        function renderSeals() {
            els.sealStage.innerHTML = "";
            state.seals.forEach((seal) => {
                const item = document.createElement("div");
                item.className = `seal-item absolute cursor-move ${seal.id === state.activeSealId ? "active" : ""}`;
                item.style.left = `${seal.x}%`;
                item.style.top = `${seal.y}%`;
                item.style.width = `${seal.scale}%`;
                item.style.opacity = String(seal.opacity);
                item.style.transform = `translate(-50%, -50%) rotate(${seal.rotation}deg)`;
                item.style.touchAction = "none";
                item.innerHTML = `
                    <div class="relative">
                        <img class="w-full h-auto pointer-events-none mix-blend-multiply drop-shadow" src="${seal.src}" alt="seal">
                        <div class="seal-outline absolute inset-0 rounded border-2 border-dashed border-sky-500 bg-sky-400/10 opacity-0 pointer-events-none"></div>
                    </div>
                `;
                item.addEventListener("pointerdown", (e) => {
                    e.preventDefault();
                    setActiveSeal(seal.id);
                    dragStart(seal.id, e.clientX, e.clientY, e.pointerId);
                });
                item.addEventListener("click", (e) => {
                    e.stopPropagation();
                    setActiveSeal(seal.id);
                });
                els.sealStage.appendChild(item);
            });
            syncControlsFromActiveSeal();
        }

        function setActiveSeal(sealId) {
            state.activeSealId = sealId;
            renderSeals();
            updateDownloadBtnState();
        }

        function resetGeneratedSeals() {
            state.seals = [];
            state.activeSealId = null;
            renderSeals();
        }

        function addSeal(overrides = {}) {
            if (!state.processedSealData) return;
            const seal = createSeal(overrides);
            state.seals.push(seal);
            state.activeSealId = seal.id;
            renderSeals();
            updateDownloadBtnState();
        }

        function duplicateActiveSeal() {
            const baseSeal = getActiveSeal() || state.seals[0];
            if (!baseSeal) {
                addSeal();
                return;
            }
            addSeal({
                x: Math.min(90, baseSeal.x + 8),
                y: Math.min(90, baseSeal.y + 8),
                scale: baseSeal.scale,
                opacity: baseSeal.opacity,
                rotation: baseSeal.rotation
            });
        }

        function deleteActiveSeal() {
            const activeSeal = getActiveSeal();
            if (!activeSeal) return;
            state.seals = state.seals.filter((seal) => seal.id !== activeSeal.id);
            state.activeSealId = state.seals.length ? state.seals[state.seals.length - 1].id : null;
            renderSeals();
            updateDownloadBtnState();
        }

        function resetSource() {
            state.sourceImgData = null;
            state.processedSealData = null;
            els.sourceInput.value = "";
            els.editSource.classList.add("hidden");
            els.uploadSource.classList.remove("hidden");
            els.successBar.classList.add("hidden");
            resetGeneratedSeals();
            updateDownloadBtnState();
        }

        function resetTarget() {
            state.targetImgData = null;
            els.targetInput.value = "";
            els.editTarget.classList.add("hidden");
            els.uploadTarget.classList.remove("hidden");
            updateDownloadBtnState();
        }

        function processSeal() {
            if (!state.sourceImgData) return;
            const img = new Image();
            img.src = state.sourceImgData;
            img.onload = () => {
                const canvas = els.canvas;
                const ctx = canvas.getContext("2d");
                const maxWidth = 1000;
                const ratio = Math.min(1, maxWidth / img.width);
                canvas.width = img.width * ratio;
                canvas.height = img.height * ratio;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    const isRed = (r - g > state.threshold) && (r - b > state.threshold);
                    if (!isRed) data[i + 3] = 0;
                }
                ctx.putImageData(imageData, 0, 0);
                state.processedSealData = canvas.toDataURL("image/png");
                els.processedPreview.src = state.processedSealData;
                els.successBar.classList.remove("hidden");
                resetGeneratedSeals();
                addSeal();
            };
        }

        function updateDownloadBtnState() {
            const ready = Boolean(state.targetImgData && state.seals.length);
            const canUse = state.balance > 0;
            const enabled = ready && canUse;
            els.downloadBtn.disabled = !enabled;
            els.duplicateSealBtn.disabled = !state.processedSealData;
            els.deleteSealBtn.disabled = !getActiveSeal();
            if (enabled) {
                els.downloadBtn.className = "flex-1 px-4 py-2 rounded-lg bg-gradient-to-r from-sky-600 to-rose-500 text-white text-sm font-bold";
                els.downloadBtn.innerText = "生成并预览 PDF（消耗1点）";
                return;
            }
            els.downloadBtn.className = "flex-1 px-4 py-2 rounded-lg bg-slate-200 text-slate-500 text-sm font-bold cursor-not-allowed";
            if (!state.processedSealData) {
                els.downloadBtn.innerText = "等待印章提取...";
            } else if (!state.targetImgData) {
                els.downloadBtn.innerText = "等待背景上传...";
            } else if (!state.seals.length) {
                els.downloadBtn.innerText = "请先生成印章...";
            } else {
                els.downloadBtn.innerText = "余额不足，请先兑换密钥";
            }
        }

        function finalizePdf(canvas) {
            const pngData = canvas.toDataURL("image/png");
            if (!consumePoint()) {
                showRedeemMessage("余额不足，请先兑换密钥。", "error");
                updateDownloadBtnState();
                return;
            }
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({
                orientation: canvas.width >= canvas.height ? "landscape" : "portrait",
                unit: "px",
                format: [canvas.width, canvas.height]
            });
            pdf.addImage(pngData, "PNG", 0, 0, canvas.width, canvas.height);
            const blob = pdf.output("blob");
            if (state.lastPdfUrl) URL.revokeObjectURL(state.lastPdfUrl);
            state.lastPdfUrl = URL.createObjectURL(blob);
            els.finalResultImg.src = pngData;
            els.realDownloadLink.href = state.lastPdfUrl;
            els.realDownloadLink.download = "seal-result.pdf";
            els.previewModal.classList.remove("hidden");
            updateDownloadBtnState();
        }

        function generateAndPreviewPdf() {
            if (els.downloadBtn.disabled) return;
            if (state.balance <= 0) {
                showRedeemMessage("余额不足，请先兑换密钥。", "error");
                updateDownloadBtnState();
                return;
            }
            const bgImg = new Image();
            bgImg.src = state.targetImgData;
            bgImg.onload = () => {
                const canvas = document.createElement("canvas");
                canvas.width = bgImg.width;
                canvas.height = bgImg.height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(bgImg, 0, 0);
                let remaining = state.seals.length;
                if (!remaining) return;
                state.seals.forEach((seal) => {
                    const sealImg = new Image();
                    sealImg.src = seal.src;
                    sealImg.onload = () => {
                        const renderWidth = canvas.width * (seal.scale / 100);
                        const renderHeight = renderWidth * (sealImg.height / sealImg.width);
                        const centerX = canvas.width * (seal.x / 100);
                        const centerY = canvas.height * (seal.y / 100);
                        ctx.save();
                        ctx.translate(centerX, centerY);
                        ctx.rotate((seal.rotation * Math.PI) / 180);
                        ctx.globalAlpha = seal.opacity;
                        ctx.drawImage(sealImg, -renderWidth / 2, -renderHeight / 2, renderWidth, renderHeight);
                        ctx.restore();
                        remaining -= 1;
                        if (remaining === 0) finalizePdf(canvas);
                    };
                });
            };
        }

        function closeModal() {
            els.previewModal.classList.add("hidden");
        }

        let dragState = {
            isDragging: false,
            sealId: null,
            startX: 0,
            startY: 0,
            pointerId: null
        };

        function dragStart(sealId, clientX, clientY, pointerId = null) {
            dragState.isDragging = true;
            dragState.sealId = sealId;
            dragState.startX = clientX;
            dragState.startY = clientY;
            dragState.pointerId = pointerId;
        }

        function dragMove(clientX, clientY, pointerId = null) {
            if (!dragState.isDragging) return;
            if (dragState.pointerId !== null && pointerId !== null && dragState.pointerId !== pointerId) return;
            const seal = state.seals.find((item) => item.id === dragState.sealId);
            if (!seal) return;
            const rect = els.canvasContainer.getBoundingClientRect();
            const dx = ((clientX - dragState.startX) / rect.width) * 100;
            const dy = ((clientY - dragState.startY) / rect.height) * 100;
            seal.x = Math.max(0, Math.min(100, seal.x + dx));
            seal.y = Math.max(0, Math.min(100, seal.y + dy));
            dragState.startX = clientX;
            dragState.startY = clientY;
            renderSeals();
        }

        function dragEnd() {
            dragState.isDragging = false;
            dragState.sealId = null;
            dragState.pointerId = null;
        }

        function updateActiveSeal(patch) {
            const seal = getActiveSeal();
            if (!seal) return;
            Object.assign(seal, patch);
            renderSeals();
        }

        els.sourceInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                state.sourceImgData = event.target.result;
                els.sourcePreview.src = state.sourceImgData;
                els.uploadSource.classList.add("hidden");
                els.editSource.classList.remove("hidden");
                processSeal();
            };
            reader.readAsDataURL(file);
        });

        els.targetInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                state.targetImgData = event.target.result;
                els.targetDisplay.src = state.targetImgData;
                els.uploadTarget.classList.add("hidden");
                els.editTarget.classList.remove("hidden");
                updateDownloadBtnState();
            };
            reader.readAsDataURL(file);
        });

        els.canvasContainer.addEventListener("click", () => {
            if (!state.seals.length) return;
            if (!state.activeSealId) setActiveSeal(state.seals[state.seals.length - 1].id);
        });

        els.thresholdSlider.addEventListener("input", (e) => {
            state.threshold = parseInt(e.target.value, 10);
            els.thresholdValue.innerText = String(state.threshold);
            processSeal();
        });

        els.scaleSlider.addEventListener("input", (e) => {
            const scale = parseInt(e.target.value, 10);
            els.scaleValue.innerText = `${scale}%`;
            updateActiveSeal({ scale });
        });

        els.opacitySlider.addEventListener("input", (e) => {
            const opacity = parseInt(e.target.value, 10) / 100;
            els.opacityValue.innerText = `${Math.round(opacity * 100)}%`;
            updateActiveSeal({ opacity });
        });

        els.rotationSlider.addEventListener("input", (e) => {
            const rotation = parseInt(e.target.value, 10);
            els.rotationValue.innerText = `${rotation} deg`;
            updateActiveSeal({ rotation });
        });

        els.duplicateSealBtn.addEventListener("click", duplicateActiveSeal);
        els.deleteSealBtn.addEventListener("click", deleteActiveSeal);
        els.redeemBtn.addEventListener("click", redeemKey);
        els.redeemInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") redeemKey();
        });
        els.downloadBtn.addEventListener("click", generateAndPreviewPdf);

        window.addEventListener("pointermove", (e) => dragMove(e.clientX, e.clientY, e.pointerId));
        window.addEventListener("pointerup", dragEnd);
        window.addEventListener("pointercancel", dragEnd);

        loadBalanceState();
        renderSeals();
        updateDownloadBtnState();
    </script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./sw.js").catch(() => {});
            });
        }
    </script>
</body>
</html>
